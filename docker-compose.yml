services:
  mysql:
    image: mysql:8.0
    container_name: battleiq-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: battleiq
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql

  redis:
    image: redis:7
    container_name: battleiq-redis
    ports:
      - "6379:6379"

  app:
    build: .
    container_name: battleiq-app
    depends_on:
      - mysql
      - redis
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/battleiq
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      GROQ_API_KEY: actual_key
      TMDB_API_KEY: actual_key
      PORT: 8080

volumes:
  mysql_data:
