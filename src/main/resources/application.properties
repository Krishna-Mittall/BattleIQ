spring.application.name=BattleIQ

spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

#reddis
#spring.data.redis.host=localhost
#spring.data.redis.port=6379
spring.data.redis.host=${SPRING_DATA_REDIS_HOST}
spring.data.redis.port=${SPRING_DATA_REDIS_PORT}
spring.data.redis.username=${SPRING_DATA_REDIS_USERNAME:}
spring.data.redis.password=${SPRING_DATA_REDIS_PASSWORD:}
spring.data.redis.ssl.enabled=${SPRING_DATA_REDIS_SSL_ENABLED:false}

#TMDB API
tmdb.api.key=${TMDB_API_KEY}

tmdb.base.url=https://api.themoviedb.org/3

#Groq Api
groq.api.key=${GROQ_API_KEY}
groq.base.url=https://api.groq.com/openai/v1/chat/completions
groq.model=llama-3.3-70b-versatile



#Game Config
game.timer.question=15
game.timer.tiebreaker=15
game.points.correct=10
game.points.speed.bonus=5
game.points.speed.threshold=5
game.max.rounds=3

server.port=${PORT:8080}
frontend.url=${FRONTEND_URL:http://localhost:5173}
